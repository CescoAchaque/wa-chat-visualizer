<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Chat Viewer Ultimate</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark-theme">
    <div id="app-container">
        <div id="upload-section">
            <h2>Seleziona il file .txt E tutti i media insieme</h2>
            <p style="color: #8696a0; font-size: 14px;">Entra nella cartella, premi CTRL+A (o CMD+A) per selezionare
                tutto e clicca Apri.</p>
            <input type="file" id="file-input" accept=".txt,.jpg,.jpeg,.png,.gif,.opus,.aac,.mp4,.mov,.3gp,.webm,.webp"
                multiple>

            <div id="progress-container" class="hidden"
                style="margin-top: 20px; width: 100%; max-width: 400px; margin-left: auto; margin-right: auto;">
                <!-- Testo dinamico che cambierà da "Lettura messaggi" a "Rendering grafico" -->
                <div id="progress-text" style="font-weight: bold; margin-bottom: 8px; color: #53bdeb;">Lettura file in
                    corso...</div>
                <div
                    style="width: 100%; background-color: #202c33; height: 10px; border-radius: 5px; overflow: hidden; margin-bottom: 10px;">
                    <div id="progress-bar"
                        style="width: 0%; height: 100%; background-color: #00a884; transition: width 0.1s;"></div>
                </div>

                <!-- Nuova Seconda Barra dedicata al Rendering Grafico -->
                <div id="render-progress-box" class="hidden">
                    <div id="render-text" style="font-size: 13px; margin-bottom: 4px; color: #8696a0;">Elaborazione
                        grafica... (0%)</div>
                    <div
                        style="width: 100%; background-color: #202c33; height: 6px; border-radius: 3px; overflow: hidden;">
                        <div id="render-bar"
                            style="width: 0%; height: 100%; background-color: #34b7f1; transition: width 0.1s;"></div>
                    </div>
                </div>
            </div>

        </div>

        <div id="chat-screen" class="hidden">
            <div id="chat-header">
                <div id="header-left">
                    <button id="back-to-upload" title="Importa un'altra chat">↩ Nuova Chat</button>
                    <!-- ID modificato per inserire il nome del file dinamico -->
                    <span id="chat-title-text" style="margin-left: 15px;">Visualizzatore Chat</span>
                </div>
                <div id="header-controls">
                    <button id="dark-mode-toggle" title="Cambia tema">☀️</button>
                    <div id="zoom-control">
                        <span>A-</span>
                        <input type="range" id="zoom-slider" min="12" max="24" value="16">
                        <span>A+</span>
                    </div>
                </div>
            </div>
            <div id="main-content">
                <div id="timeline-nav">
                    <h3>Calendario</h3>
                    <div id="timeline-links"></div>
                </div>
                <div id="chat-body"></div>
            </div>
        </div>
    </div>

    <!-- Lightbox con didascalia per le info dei media -->
    <div id="lightbox" class="hidden" onclick="chiudiLightbox()">
        <span class="lightbox-close" onclick="chiudiLightbox()">&times;</span>
        <button class="lightbox-nav prev" onclick="navigaMedia(-1, event)">&#10094;</button>
        <div id="lightbox-container" style="display: flex; flex-direction: column; align-items: center;">
            <div id="lightbox-content" onclick="event.stopPropagation()"></div>
            <!-- Barra delle info del media -->
            <div id="lightbox-caption" onclick="event.stopPropagation()"></div>
        </div>
        <button class="lightbox-nav next" onclick="navigaMedia(1, event)">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
